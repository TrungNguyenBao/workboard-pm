version: '3.9'

services:
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command:
      - "http"
      - "nginx:80"
      - "--authtoken=${NGROK_AUTHTOKEN}"
    ports:
      - "4040:4040"
    depends_on:
      - nginx
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
