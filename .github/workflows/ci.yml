name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Prevent concurrent deploys — queue instead of cancel
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      # Setup Python and uv
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install backend dependencies
        run: |
          cd backend
          uv sync
          
      # Backend Lint & Test
      - name: Backend Lint (Ruff)
        run: |
          cd backend
          uv run ruff check app/
          
      - name: Backend Tests
        run: |
          cd backend
          uv run pytest -v
          
      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
          
      # Frontend Lint & Test
      - name: Frontend Lint
        run: |
          cd frontend
          npm run lint
          
      # Uncomment if there are frontend tests
      # - name: Frontend Tests
      #   run: |
      #     cd frontend
      #     npm run test:run

  # ── CD: Deploy to self-hosted VPS (push to main only) ──────────────────────
  deploy:
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, production]

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        env:
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          ENV_FILE_PATH: ${{ secrets.ENV_FILE_PATH }}
        run: |
          chmod +x scripts/deploy.sh
          bash scripts/deploy.sh
